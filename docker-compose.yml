version: "3.9"

services:
  # ─── PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: rootgs_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rootgs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rootgs_secret}
      POSTGRES_DB: ${POSTGRES_DB:-rootgs_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rootgs}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rootgs_net

  # ─── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rootgs_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rootgs_net

  # ─── FastAPI Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rootgs_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-rootgs}:${POSTGRES_PASSWORD:-rootgs_secret}@db:5432/${POSTGRES_DB:-rootgs_db}
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rootgs_net
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  # ─── React Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rootgs_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - rootgs_net

  # ─── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: rootgs_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - rootgs_net

volumes:
  postgres_data:
  redis_data:
  media_data:

networks:
  rootgs_net:
    driver: bridge
